    type: tte
    priority: 98
    is_composite: true
    composite_of:
      - CV_DEATH
      - MI
      - STROKE
      - URGENT_REVASC
    synonyms:
      - "4-point MACE"
      - "four-point MACE"
      - "CV death, MI, stroke, or urgent revascularization"
      - "MACE including revascularization"

  # HF-specific composites
  cv_death_or_hf_hosp:
