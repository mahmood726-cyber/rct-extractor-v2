  unstable_angina:
    canonical: "UNSTABLE_ANGINA"
    type: binary
    priority: 70
    synonyms:
      - "unstable angina"
      - "UA"
      - "hospitalization for unstable angina"
      - "unstable angina pectoris"

  atrial_fibrillation:
    canonical: "AFIB"
    type: binary
    priority: 60
    synonyms:
      - "atrial fibrillation"
      - "AF"
      - "AFib"
      - "new-onset atrial fibrillation"
      - "incident AF"

  # ============================================================
  # RENAL ENDPOINTS (common in HF trials)
  # ============================================================

  renal_composite:
    canonical: "RENAL_COMPOSITE"
    type: tte
    priority: 80
    synonyms:
      - "renal composite"
      - "composite renal endpoint"
      - "sustained decline in eGFR"
      - "doubling of creatinine"
      - "end-stage renal disease"
      - "ESRD"
      - "renal death"

  worsening_renal_function:
    canonical: "WORSENING_RENAL"
    type: binary
    priority: 65
    synonyms:
      - "worsening renal function"
      - "acute kidney injury"
      - "AKI"
      - "renal impairment"

# ============================================================
# TIMEPOINT NORMALIZATION RULES
# ============================================================

timepoints:
  patterns:
    # Days
    - pattern: '(\d+)\s*(?:day|d)\b'
      normalize_to: "{n}d"
      days_formula: "n"

    # Weeks
    - pattern: '(\d+)\s*(?:week|wk|w)\b'
      normalize_to: "{n}w"
      days_formula: "n * 7"

    # Months
    - pattern: '(\d+)\s*(?:month|mo|m)\b'
      normalize_to: "{n}m"
      days_formula: "n * 30"

    # Years
    - pattern: '(\d+(?:\.\d+)?)\s*(?:year|yr|y)\b'
      normalize_to: "{n}y"
      days_formula: "n * 365"

    # Median follow-up
    - pattern: 'median\s+(?:follow-up|follow\s+up|fu)\s*(?:of\s+)?(\d+(?:\.\d+)?)\s*(year|month|day)'
      normalize_to: "median_{n}{unit}"
      is_median: true

  selection_rules:
    # Priority order for timepoint selection
    - "If 'primary' is labeled, use primary timepoint"
    - "If 'end of study' or 'final' is labeled, prefer that"
    - "Otherwise, select longest follow-up"
    - "If ambiguous, flag for review"

