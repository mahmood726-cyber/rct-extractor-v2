# Cardio Endpoint Vocabulary for RCT Extraction
# Domain: Heart Failure (HF) + Acute Coronary Syndrome (ACS)
#
# Each endpoint has:
# - canonical: Standardized name for output
# - type: binary | tte | continuous
# - synonyms: List of text variations (case-insensitive fuzzy matched)
# - priority: Higher = prefer this interpretation when ambiguous
# - composite_of: For composite endpoints, list components

endpoints:

  # ============================================================
  # MORTALITY ENDPOINTS
  # ============================================================

  all_cause_death:
    canonical: "ALL_CAUSE_DEATH"
    type: tte
    priority: 100
    synonyms:
      - "all-cause death"
      - "all-cause mortality"
      - "death from any cause"
      - "total mortality"
      - "overall mortality"
      - "mortality"
      - "death"
      - "all cause death"
      - "deaths from all causes"

  cardiovascular_death:
    canonical: "CV_DEATH"
    type: tte
    priority: 95
    synonyms:
      - "cardiovascular death"
      - "CV death"
      - "cardiac death"
      - "death from cardiovascular causes"
      - "cardiovascular mortality"
      - "CV mortality"
      - "death due to cardiovascular causes"
      - "heart-related death"

  sudden_cardiac_death:
    canonical: "SUDDEN_CARDIAC_DEATH"
    type: tte
    priority: 90
    synonyms:
      - "sudden cardiac death"
      - "sudden death"
      - "SCD"
      - "sudden cardiac arrest"

  # ============================================================
  # HEART FAILURE ENDPOINTS
  # ============================================================

  hf_hospitalization:
    canonical: "HF_HOSPITALIZATION"
    type: binary
    priority: 85
    synonyms:
      - "heart failure hospitalization"
      - "HF hospitalization"
      - "hospitalization for heart failure"
      - "hospitalization for worsening heart failure"
      - "HF admission"
      - "admission for heart failure"
      - "hospitalization for HF"
      - "worsening HF requiring hospitalization"
      - "HF requiring hospitalization"
      - "hospitalized for heart failure"
      - "heart failure admission"
      - "hospitalisation for heart failure"  # UK spelling

  urgent_hf_visit:
    canonical: "URGENT_HF_VISIT"
    type: binary
    priority: 70
    synonyms:
      - "urgent heart failure visit"
      - "urgent HF visit"
      - "urgent visit for worsening heart failure"
      - "emergency HF visit"
      - "urgent outpatient HF visit"

  worsening_hf:
    canonical: "WORSENING_HF"
    type: binary
    priority: 65
    synonyms:
      - "worsening heart failure"
      - "worsening HF"
      - "HF worsening"
      - "deterioration of heart failure"
      - "HF progression"

  # ============================================================
  # MYOCARDIAL INFARCTION
  # ============================================================

  myocardial_infarction:
    canonical: "MI"
    type: tte
    priority: 85
    synonyms:
      - "myocardial infarction"
      - "MI"
      - "heart attack"
      - "acute myocardial infarction"
      - "AMI"
      - "nonfatal myocardial infarction"
      - "non-fatal MI"
      - "nonfatal MI"
      - "fatal or nonfatal MI"
      - "recurrent MI"
      - "reinfarction"

  stemi:
    canonical: "STEMI"
    type: binary
    priority: 80
    synonyms:
      - "ST-elevation myocardial infarction"
      - "STEMI"
      - "ST elevation MI"
      - "ST-segment elevation MI"

  nstemi:
    canonical: "NSTEMI"
    type: binary
    priority: 80
    synonyms:
      - "non-ST-elevation myocardial infarction"
      - "NSTEMI"
      - "non-STEMI"
