    synonyms:
      - "cardiovascular death or hospitalization for heart failure"
      - "CV death or HF hospitalization"
      - "composite of CV death and HF hospitalization"
      - "worsening heart failure or cardiovascular death"
      - "death from cardiovascular causes or hospitalization for heart failure"
      - "cardiovascular death or worsening heart failure"

  total_hf_events:
    canonical: "TOTAL_HF_EVENTS"
    type: binary  # Often reported as rate
    priority: 85
    synonyms:
      - "total heart failure events"
      - "total HF events"
      - "total hospitalizations for heart failure"
      - "recurrent HF hospitalizations"

  # ============================================================
  # OTHER CARDIOVASCULAR
