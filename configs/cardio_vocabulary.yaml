  stroke:
    canonical: "STROKE"
    type: tte
    priority: 85
    synonyms:
      - "stroke"
      - "cerebrovascular accident"
      - "CVA"
      - "nonfatal stroke"
      - "non-fatal stroke"
      - "fatal or nonfatal stroke"
      - "ischemic stroke"
      - "hemorrhagic stroke"
