      - "major adverse cardiac events"
      - "cardiovascular death, myocardial infarction, or stroke"
      - "CV death, MI, or stroke"
      - "composite of cardiovascular death, MI, and stroke"
      - "3-point MACE"
      - "three-point MACE"

  mace_4point:
