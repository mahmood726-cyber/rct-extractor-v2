name: Outside Solution Benchmark

on:
  workflow_dispatch:
  pull_request:
    branches: [main, master, develop]
    paths:
      - "scripts/benchmark_outside_solutions.py"
      - "scripts/evaluate_real_rct_metrics.py"
      - "gold_data/gold_50.jsonl"
      - "gold_data/baseline_results.json"
      - "gold_data/mega/mega_eval_v10_merged.jsonl"
      - "gold_data/mega/v10_pdf_results/results_*.jsonl"
      - ".github/workflows/outside-solution-benchmark.yml"
  push:
    branches: [main, master, develop]
    paths:
      - "scripts/benchmark_outside_solutions.py"
      - "scripts/evaluate_real_rct_metrics.py"
      - "gold_data/gold_50.jsonl"
      - "gold_data/baseline_results.json"
      - "gold_data/mega/mega_eval_v10_merged.jsonl"
      - "gold_data/mega/v10_pdf_results/results_*.jsonl"
      - ".github/workflows/outside-solution-benchmark.yml"

jobs:
  benchmark:
    name: Run Outside Benchmark
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run benchmark
        run: |
          python scripts/benchmark_outside_solutions.py --allow-current-fallback

      - name: Show summary
        run: |
          sed -n '1,160p' output/outside_solution_benchmark.md

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: outside-solution-benchmark
          path: |
            output/outside_solution_benchmark.json
            output/outside_solution_benchmark.md
            output/real_rct_results_external_mega_v10_mapped.json
            output/real_rct_results_external_v10_pdf_mapped.json
          retention-days: 30
