name: RCT Extractor Tests

on:
  push:
    branches: [main, develop, 'release/*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      run_pdf_tests:
        description: 'Run PDF validation tests'
        required: false
        default: 'false'

env:
  PYTHON_DEFAULT: '3.10'

jobs:
  # ===========================================================================
  # UNIT TESTS
  # ===========================================================================
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-timeout

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short -m "not slow and not pdf and not integration" \
            --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.10'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ===========================================================================
  # INTEGRATION TESTS
  # ===========================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short

  # ===========================================================================
  # REGULATORY VALIDATION
  # ===========================================================================
  regulatory-validation:
    name: Regulatory Validation (IQ/OQ/PQ)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run regulatory validation suite
        run: |
          python regulatory_validation_suite.py

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regulatory-validation-report
          path: |
            validation_report_*.json
            regulatory_validation_*.log
          retention-days: 30

  # ===========================================================================
  # COMPREHENSIVE VALIDATION
  # ===========================================================================
  comprehensive-validation:
    name: Comprehensive Validation
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run comprehensive validation
        run: |
          python run_comprehensive_validation.py

      - name: Upload validation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: comprehensive-validation-results
          path: |
            validation_results_*.json
            comprehensive_*.log
          retention-days: 30

  # ===========================================================================
  # CTG VALIDATION
  # ===========================================================================
  ctg-validation:
    name: ClinicalTrials.gov Validation
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CTG validation
        run: |
          python scripts/run_full_ctg_validation.py --sample 100

      - name: Upload CTG validation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ctg-validation-results
          path: |
            ctg_validation_*.json
            ctg_validation_*.log
          retention-days: 30

  # ===========================================================================
  # TABLE & FOREST PLOT TESTS
  # ===========================================================================
  extraction-tests:
    name: Table & Forest Plot Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run table extraction tests
        run: |
          pytest tests/test_table_extraction.py -v --tb=short

      - name: Run forest plot extraction tests
        run: |
          pytest tests/test_forest_plot_extraction.py -v --tb=short

  # ===========================================================================
  # R PACKAGE VALIDATION
  # ===========================================================================
  r-package-validation:
    name: R Package Validation
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run R package validation
        run: |
          python run_r_package_validation.py --all

      - name: Upload R package validation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: r-package-validation-results
          path: |
            output/r_package_validation*.json
          retention-days: 30

  # ===========================================================================
  # PDF VALIDATION (OPTIONAL)
  # ===========================================================================
  pdf-validation:
    name: PDF Validation
    runs-on: ubuntu-latest
    needs: unit-tests
    if: ${{ github.event.inputs.run_pdf_tests == 'true' || github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng poppler-utils

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pdfplumber pymupdf pytesseract pillow

      - name: Restore PDF cache
        uses: actions/cache@v4
        with:
          path: test_pdfs/pmc_open_access/
          key: pmc-pdfs-ci-${{ hashFiles('data/external_validation_dataset.py') }}
          restore-keys: |
            pmc-pdfs-ci-
            pmc-pdfs-

      - name: Download test PDFs (cached mode)
        run: |
          # Use cached PDFs, download up to 20 if cache empty
          python scripts/download_pmc_pdfs.py --ci-mode --max 20 || echo "PDF download skipped"

      - name: Run PDF validation tests
        run: |
          pytest tests/test_pdf_validation.py -v --tb=short -m "pdf and not slow" || echo "PDF tests skipped"

      - name: Run real PDF validation
        run: |
          python scripts/run_real_pdf_validation.py --max 10 --ci-mode --threshold 0.90 || echo "Real PDF validation skipped"
        continue-on-error: true

      - name: Check for regressions
        run: |
          python scripts/pdf_regression_check.py --tolerance 0.05 || echo "Regression check skipped"
        continue-on-error: true

      - name: Save PDF cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: test_pdfs/pmc_open_access/
          key: pmc-pdfs-ci-${{ hashFiles('data/external_validation_dataset.py') }}

      - name: Upload PDF test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pdf-validation-results
          path: |
            test_pdfs/manifest.json
            output/pdf_validation_report.json
            output/regression_check_result.json
          retention-days: 30

  # ===========================================================================
  # CODE QUALITY
  # ===========================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: 'pip'

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy black isort

      - name: Check formatting with Black
        run: black --check --diff src/ tests/ || true

      - name: Check imports with isort
        run: isort --check-only --diff src/ tests/ || true

      - name: Lint with Ruff
        run: ruff check src/ tests/ || true

      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports || true

  # ===========================================================================
  # SUMMARY
  # ===========================================================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, regulatory-validation, comprehensive-validation, ctg-validation, extraction-tests, r-package-validation]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "=== TEST SUMMARY ==="
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
          echo "Regulatory Validation: ${{ needs.regulatory-validation.result }}"
          echo "Comprehensive Validation: ${{ needs.comprehensive-validation.result }}"
          echo "CTG Validation: ${{ needs.ctg-validation.result }}"
          echo "Extraction Tests: ${{ needs.extraction-tests.result }}"
          echo "R Package Validation: ${{ needs.r-package-validation.result }}"
          echo "===================="

      - name: Fail if any test failed
        if: |
          needs.unit-tests.result == 'failure' ||
          needs.integration-tests.result == 'failure' ||
          needs.regulatory-validation.result == 'failure' ||
          needs.comprehensive-validation.result == 'failure' ||
          needs.ctg-validation.result == 'failure' ||
          needs.extraction-tests.result == 'failure' ||
          needs.r-package-validation.result == 'failure'
        run: exit 1
