[pytest]
# Test paths
testpaths = tests

# Test file patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default options
addopts =
    -v
    --tb=short
    --strict-markers
    -ra

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, uses real components)
    pdf: PDF-specific tests (requires PDF files)
    slow: Long-running tests (skipped by default, use --runslow)
    ocr: OCR-related tests (requires Tesseract)
    gold: Gold standard validation tests
    regulatory: Regulatory validation tests (IQ/OQ/PQ)
    multilang: Multi-language/non-English PDF tests

# Minimum pytest version
minversion = 7.0

# Warning filters
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Console output
console_output_style = progress

# Coverage settings (when using pytest-cov)
# Uncomment to enable by default:
# addopts = --cov=src --cov-report=html --cov-report=term-missing

# Timeout for tests (requires pytest-timeout)
# timeout = 300

# Parallel execution (requires pytest-xdist)
# addopts = -n auto

# Log settings
log_cli = true
log_cli_level = WARNING
log_cli_format = %(asctime)s %(levelname)s %(message)s
log_cli_date_format = %H:%M:%S

# Test result caching
cache_dir = .pytest_cache

# Doctest settings
doctest_optionflags = NORMALIZE_WHITESPACE IGNORE_EXCEPTION_DETAIL
